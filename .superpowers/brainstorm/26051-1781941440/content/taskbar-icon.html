<h2>系统托盘图标设计</h2>
<p class="subtitle">黑白纯色，设计元素：AI + 问答。macOS 菜单栏显示。</p>

<div class="cards">
  <div class="card" data-choice="icon-a" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 对话气泡 + AI 脑 -->
        <circle cx="24" cy="18" r="8" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="22" cy="17" r="2" fill="white"/>
        <circle cx="27" cy="17" r="2" fill="white"/>
        <path d="M21 22 Q24 25 27 22" fill="none" stroke="white" stroke-width="1.5"/>
        <rect x="14" y="28" width="20" height="14" rx="3" fill="none" stroke="white" stroke-width="2"/>
        <path d="M19 42 L19 38 L29 38 L29 42" fill="none" stroke="white" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>A — 机器人头像 + 对话气泡</h3>
      <p>简洁拟人 AI 形象，圆形头部 + 对话气泡 + 问号角标。辨识度高。</p>
    </div>
  </div>

  <div class="card" data-choice="icon-b" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- A + ? 字母组合 -->
        <text x="24" y="30" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="monospace">A?</text>
        <line x1="10" y1="36" x2="38" y2="36" stroke="white" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B — "A?" 字标</h3>
      <p>AI 的 A + 问答的 ? 组合为 A?，下方横线。极简字母标，专业感强。</p>
    </div>
  </div>

  <div class="card" data-choice="icon-c" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 神经网络 + 对话 -->
        <circle cx="24" cy="24" r="6" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="14" cy="14" r="2.5" fill="white"/>
        <circle cx="34" cy="14" r="2.5" fill="white"/>
        <circle cx="14" cy="34" r="2.5" fill="white"/>
        <circle cx="34" cy="34" r="2.5" fill="white"/>
        <line x1="16.5" y1="14" x2="24" y2="18" stroke="white" stroke-width="1.2"/>
        <line x1="31.5" y1="14" x2="24" y2="18" stroke="white" stroke-width="1.2"/>
        <line x1="16.5" y1="34" x2="24" y2="30" stroke="white" stroke-width="1.2"/>
        <line x1="31.5" y1="34" x2="24" y2="30" stroke="white" stroke-width="1.2"/>
        <!-- 问号在中心 -->
        <text x="24" y="28" text-anchor="middle" fill="white" font-size="8" font-weight="bold">?</text>
      </svg>
    </div>
    <div class="card-body">
      <h3>C — 神经网络 + 问答中心</h3>
      <p>节点连线表现 AI 网络结构，中心问号代表问答。技术感强。</p>
    </div>
  </div>

  <div class="card" data-choice="icon-d" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;">
      <svg width="48" height="48" viewBox="0 0 48 48">
        <!-- 太极式 AI + Q&A 融合 -->
        <path d="M24 8 Q12 8 12 20 Q12 32 24 32 Q36 32 36 20 Q36 8 24 8 Z" fill="none" stroke="white" stroke-width="2"/>
        <text x="18" y="18" fill="white" font-size="8" font-weight="bold" font-family="monospace">AI</text>
        <text x="25" y="27" fill="white" font-size="9" font-weight="bold">?</text>
        <path d="M24 20 Q24 24 24 24" fill="none" stroke="white" stroke-width="1"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>D — 双区融合</h3>
      <p>不规则椭圆分上下，上方 AI 标识下方问号。融合 AI 与问答两个概念。</p>
    </div>
  </div>
</div>

<div class="section">
  <p style="opacity:0.6;font-size:12px;">所有图标均为黑白色、16×16pt 尺寸适配 macOS 菜单栏 24px 高度。实际渲染会更小更精细。</p>
</div>
